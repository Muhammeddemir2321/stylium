<footer class="footer">
  <div class="container footer-grid">
    <div>
      <div class="brand">{{ site.brand }}</div>
      <p>{{ site.tagline }}</p>
    </div>

    <div>
      <div class="head">İletişim</div>
      <p>{{ site.address }}</p>
      <p>{{ site.phoneText }}</p>
    </div>

    <div>
      <div class="head">Sosyal</div>
      <a [href]="site.instagramUrl" target="_blank" rel="noopener">Instagram</a>
    </div>
  </div>

  <div class="container copy">© {{ year }} {{ site.brand }}. Tüm hakları saklıdır.</div>
</footer>
