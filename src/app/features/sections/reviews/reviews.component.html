<div class="container">
  <div class="reviews-head">
    <span class="section-kicker">Yorumlar</span>
    <h2 class="section-title">Randevudan çıkan his, aynadan önce belli olur.</h2>
  </div>

  <div class="reviews">
    <article class="review-card" *ngFor="let r of reviews">
      <div class="stars" aria-label="5 yıldız">
        <span *ngFor="let _ of stars">★</span>
      </div>
      <p>“{{ r.text }}”</p>
      <div class="who">
        <strong>{{ r.name }}</strong>
        <span>{{ r.title }}</span>
      </div>
    </article>
  </div>
</div>
