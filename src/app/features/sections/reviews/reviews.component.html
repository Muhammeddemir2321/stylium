<div class="container">
  <h2 class="section-title">Yorumlar</h2>
  <p class="section-sub">Müşterilerimizin deneyimleri.</p>

  <div class="grid reviews">
    <div class="card" *ngFor="let r of reviews">
      <div class="stars">
        <span *ngFor="let _ of stars">★</span>
      </div>
      <div class="text">“{{ r.text }}”</div>
      <div class="who">{{ r.name }} • <span class="muted">{{ r.title }}</span></div>
    </div>
  </div>
</div>
