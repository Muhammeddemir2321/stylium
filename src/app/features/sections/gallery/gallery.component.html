<div class="container">
  <div class="gallery-head">
    <div>
      <span class="section-kicker">Galeri</span>
      <h2 class="section-title">Detay çizgisi, geçiş kalitesi ve gerçek salon dokusu.</h2>
    </div>
    <p class="section-sub">Son çalışmalardan seçilen kareler. Görsellere tıklayarak büyük halde inceleyebilirsin.</p>
  </div>

  <div class="gallery">
    <a class="tile" *ngFor="let img of images; let i = index" [class.featured]="i === 0" [href]="img" target="_blank" rel="noopener">
      <img [src]="img" alt="Stylium berber çalışması" loading="lazy" />
      <span>0{{ i + 1 }}</span>
    </a>
  </div>
</div>
